name: release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

env:
  GO_VERSION: '1.24'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install prerequisites
        run: |
          sudo apt-get update -y
          sudo apt-get install \
            build-essential \
            libbtrfs-dev \
            libgpgme-dev \
            libseccomp-dev \
            pkg-config -yqq

      - name: Run tests
        run: go test -v -race ./...

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build release artifacts
        run: make release

      - name: Verify artifacts
        run: |
          echo "Release artifacts:"
          ls -lah dist/releases/
          echo ""
          echo "Checksums:"
          cat dist/releases/checksums.txt

      - name: Detect pre-release
        id: prerelease
        env:
          TAG_REF: ${{ github.ref }}
        run: |
          TAG="${TAG_REF#refs/tags/}"
          if [[ "$TAG" =~ -(rc|beta|alpha) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          prerelease: ${{ steps.prerelease.outputs.prerelease }}
          files: |
            dist/releases/*.tar.gz
            dist/releases/checksums.txt
          fail-on-unmatched-files: true
          generate_release_notes: true
