kind: pipeline
type: docker
name: default

trigger:
  branch:
    - main
  event:
    - push
    - pull_request

steps:
  - name: test
    image: golang:1.22
    commands:
      - go mod download
      - go test -v -race ./...

  - name: build
    image: golang:1.22
    commands:
      - go build -o app .
    depends_on:
      - test
