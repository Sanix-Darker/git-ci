kind: pipeline
type: docker
name: default

trigger:
  branch:
    - main
  event:
    - push

environment:
  GO_VERSION: "1.22"

steps:
  - name: test
    image: golang:${GO_VERSION}
    commands:
      - go mod download
      - go test -v -race -count=1 ./...

  - name: build
    image: golang:${GO_VERSION}
    commands:
      - go build -o app .
    depends_on:
      - test

services:
  - name: postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test

  - name: redis
    image: redis:7-alpine
