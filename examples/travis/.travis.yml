# =============================================================================
# Travis CI Pipeline — Go Project with Matrix Build
# =============================================================================
# Travis CI uses a simpler YAML model where build stages run sequentially,
# and the matrix is defined via the 'go' version list directly.
#
# Run:   gci run -f examples/travis/.travis.yml --docker
#        gci validate -f examples/travis/.travis.yml
# =============================================================================

# Specify the language runtime
language: go

# Go version matrix — Travis creates a separate job for each version
go:
  - "1.21"
  - "1.22"
  - "1.23"

# Use Go modules
go_import_path: github.com/myorg/myapp

# Environment variables
env:
  global:
    - GO111MODULE=on
    - CGO_ENABLED=0

# Cache Go modules between builds
cache:
  directories:
    - $HOME/.cache/go-build
    - $HOME/go/pkg/mod

# Install dependencies (overrides default 'go get')
install:
  - go mod download

# Build lifecycle — runs before the script phase
before_script:
  - go fmt ./...
  - go vet ./...

# Script phase — determines build success (exit code matters)
script:
  - go test -v -race -count=1 ./...

# After success — runs if script phase succeeds
after_success:
  - go build -ldflags="-s -w" -o myapp .

# Stages enable more complex multi-job pipelines
jobs:
  include:
    - stage: lint
      go: "1.22"
      script:
        - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
        - golangci-lint run --timeout 5m

    - stage: test
      go: "1.22"
      env:
        - COVERAGE=true
      script:
        - go test -race -coverprofile=coverage.out -covermode=atomic ./...
      after_success:
        - bash <(curl -s https://codecov.io/bash)

    - stage: build
      go: "1.22"
      script:
        - go build -ldflags="-s -w" -o myapp .
      before_deploy:
        - tar czf myapp-${TRAVIS_TAG:-latest}.tar.gz myapp

    # Deploy to GitHub Releases
    - stage: deploy
      go: "1.22"
      script: skip
      deploy:
        provider: releases
        api_key:
          secure: "YOUR_ENCRYPTED_GITHUB_TOKEN"
        file: "myapp-*.tar.gz"
        file_glob: true
        skip_cleanup: true
        on:
          tags: true

# Notifications
notifications:
  email:
    recipients:
      - ci@example.com
    on_success: always
    on_failure: always
