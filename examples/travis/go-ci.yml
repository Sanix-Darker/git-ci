# =============================================================================
# Travis CI Go CI Pipeline — Full workflow with lint, matrix test, build, deploy
# =============================================================================
# Run:   gci run -f examples/travis/go-ci.yml --docker
#        gci validate -f examples/travis/go-ci.yml
#        gci ls -f examples/travis/go-ci.yml
# =============================================================================

language: go

go:
  - "1.21"
  - "1.22"
  - "1.23"

env:
  global:
    - GO111MODULE=on
    - CGO_ENABLED=0
    - GOFLAGS=-mod=mod

cache:
  directories:
    - $HOME/.cache/go-build
    - $HOME/go/pkg/mod

install:
  - go mod download

script:
  - go test -v -race -count=1 ./... 2>&1 | tee /tmp/test-output.log
  - go test -race -coverprofile=coverage.out -covermode=atomic ./...
  - go tool cover -func=coverage.out
  - go tool cover -html=coverage.out -o /tmp/coverage.html

after_success:
  - go build -ldflags="-s -w -X main.version=${TRAVIS_COMMIT:0:7} -X main.commit=${TRAVIS_COMMIT}" -o /tmp/app .

stages:
  - lint
  - test
  - build
  - deploy

jobs:
  include:
    - stage: lint
      go: "1.22"
      env:
        - LINT_ONLY=true
      install:
        - go mod download
      script:
        - go fmt ./...
        - go vet ./...
        - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
        - golangci-lint run --timeout 5m
        - go install github.com/kisielk/errcheck@latest
        - errcheck ./......

    - stage: test
      go: "1.22"
      env:
        - COVERAGE=true
        - RACE_DETECTOR=true
      script:
        - go test -v -race -count=1 ./...
        - go test -race -coverprofile=coverage.out -covermode=atomic ./...

    - stage: test
      go: "1.22"
      os: osx
      script:
        - go test -v -count=1 ./...

    - stage: test
      go: "1.23"
      env:
        - EXPERIMENTAL=true
      script:
        - go test -v -count=1 ./...

    - stage: build
      go: "1.22"
      script:
        - go build -ldflags="-s -w -X main.version=${TRAVIS_COMMIT:0:7} -X main.commit=${TRAVIS_COMMIT}" -o app .
        - file app
        - ./app -version 2>/dev/null || echo "Version flag optional"

    - stage: build
      go: "1.23"
      script:
        - go build -ldflags="-s -w" -o app .

    - stage: deploy
      if: branch = main
      go: "1.22"
      script: skip
      before_deploy:
        - go build -ldflags="-s -w" -o app .
        - tar czf app-${TRAVIS_TAG:-latest}.tar.gz app
      deploy:
        provider: releases
        api_key:
          secure: "YOUR_ENCRYPTED_GITHUB_TOKEN"
        file: "app-*.tar.gz"
        file_glob: true
        skip_cleanup: true
        on:
          tags: true
