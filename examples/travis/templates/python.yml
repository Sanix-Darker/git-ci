language: python

python:
  - "3.9"
  - "3.10"
  - "3.11"

cache:
  pip: true

install:
  - pip install -r requirements.txt
  - pip install pytest flake8

script:
  - flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
  - pytest

jobs:
  include:
    - stage: build
      python: "3.11"
      script:
        - python setup.py sdist bdist_wheel
