language: minimal

os: linux
dist: focal

services:
  - docker

env:
  global:
    - REGISTRY=ghcr.io
    - IMAGE_NAME=myorg/myapp

script:
  - docker build -t $REGISTRY/$IMAGE_NAME:latest .

before_deploy:
  - echo "$REGISTRY_PASSWORD" | docker login $REGISTRY -u "$REGISTRY_USER" --password-stdin

deploy:
  provider: script
  script: docker push $REGISTRY/$IMAGE_NAME:latest
  on:
    branch: main
