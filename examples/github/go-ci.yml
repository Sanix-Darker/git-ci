# =============================================================================
# Go CI Pipeline — Full workflow with lint, matrix test, and build
# =============================================================================
# Run:   gci run -f examples/github/go-ci.yml
#        gci run -f examples/github/go-ci.yml --docker
# List:  gci ls -f examples/github/go-ci.yml
# =============================================================================

name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.22"
  CGO_ENABLED: "0"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Format check
        run: |
          go fmt ./...
          go vet ./...

      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run --timeout 5m

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        go-version: ["1.21", "1.22"]
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            go-version: "1.22"
            coverage: true
        exclude:
          - os: macos-latest
            go-version: "1.21"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -count=1 ./...

      - name: Generate coverage report
        if: matrix.coverage
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage
        if: matrix.coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.html

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        run: go build -ldflags="-s -w" -o app .

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: app
