# =============================================================================
# Matrix Build — Multi-dimensional with include/exclude patterns
# =============================================================================
# Demonstrates complex matrix strategies with conditional steps.
#
# Run:   gci run -f examples/github/matrix.yml
#        gci run -f examples/github/matrix.yml --job test
#        gci run --job "test (ubuntu-latest, 20)"
# List:  gci ls -f examples/github/matrix.yml
# =============================================================================

name: Matrix CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["16", "18", "20"]
        include:
          # Pin an Ubuntu + Node 20 combo for coverage reporting
          - os: ubuntu-latest
            node: "20"
            coverage: true
          # Add an experimental configuration
          - os: ubuntu-latest
            node: "21"
            experimental: true
        exclude:
          # Don't test Node 16 on Windows (known incompatibility)
          - os: windows-latest
            node: "16"
          # Skip macOS + Node 18 (unnecessary combination)
          - os: macos-latest
            node: "18"
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test

      - name: Run E2E tests
        if: matrix.experimental
        run: npm run test:e2e --if-present

      - name: Upload coverage
        if: matrix.coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/
