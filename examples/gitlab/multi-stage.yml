# =============================================================================
# Multi-Stage GitLab CI Pipeline
# =============================================================================
# Demonstrates stages, variables, needs, artifacts, manual jobs, and rules.
#
# Run:   gci run -f examples/gitlab/multi-stage.yml
#        gci run -f examples/gitlab/multi-stage.yml --stage test
#        gci run -f examples/gitlab/multi-stage.yml --docker
#        gci validate -f examples/gitlab/multi-stage.yml --provider gitlab
# List:  gci ls -f examples/gitlab/multi-stage.yml
# =============================================================================

stages:
  - lint
  - test
  - build
  - deploy

variables:
  APP_NAME: "myapp"
  APP_VERSION: "1.0.0"
  CI_IMAGE: "golang:1.22"
  CGO_ENABLED: "0"

default:
  image: ${CI_IMAGE}
  before_script:
    - go mod download
    - go version

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .go/pkg/mod/
    - vendor/

lint:
  stage: lint
  script:
    - go fmt ./...
    - go vet ./...
    - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
    - golangci-lint run --timeout 5m
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

test:
  stage: test
  script:
    - go test -race -count=1 ./...
  artifacts:
    name: "test-results-${CI_COMMIT_SHORT_SHA}"
    paths:
      - coverage.out
      - report.xml
    reports:
      junit: report.xml
    expire_in: 1 week
  coverage: '/coverage: \d+\.\d+% of statements/'

test-node-18:
  stage: test
  image: node:18
  script:
    - npm ci
    - npm test
  artifacts:
    paths:
      - coverage/
    expire_in: 1 week

test-node-20:
  stage: test
  image: node:20
  script:
    - npm ci
    - npm test
    - npm run coverage
  artifacts:
    paths:
      - coverage/
    expire_in: 1 week

build:
  stage: build
  script:
    - go build -ldflags="-s -w -X main.Version=${APP_VERSION}" -o ${APP_NAME} .
    - echo "Binary size: $(stat -c %s ${APP_NAME}) bytes"
  artifacts:
    name: "build-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${APP_NAME}
    expire_in: 1 month
  needs:
    - test
    - test-node-18
    - test-node-20

docker-build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_TAG: "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}"
  script:
    - docker build -t ${IMAGE_TAG} .
    - docker save ${IMAGE_TAG} > image.tar
  artifacts:
    paths:
      - image.tar
    expire_in: 1 hour
  needs:
    - build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy-staging:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - echo "Deploying ${APP_NAME} v${APP_VERSION} to staging..."
    - curl -X POST https://staging.example.com/deploy
  environment:
    name: staging
    url: https://staging.example.com
  needs:
    - build
    - docker-build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy-production:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - echo "Deploying ${APP_NAME} v${APP_VERSION} to production..."
    - curl -X POST https://example.com/deploy
  environment:
    name: production
    url: https://example.com
  needs:
    - deploy-staging
  when: manual
  only:
    - main
  allow_failure: false
