image: node:18

stages:
  - test
  - build
  - deploy

variables:
  CI: "true"

cache:
  paths:
    - node_modules/

before_script:
  - npm ci

test:
  stage: test
  script:
    - npm run test
    - npm run lint
  coverage: '/Lines\s+:\s+(\d+\.\d+)%/'

build:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  dependencies:
    - test
