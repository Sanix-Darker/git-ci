# =============================================================================
# Drone CI Go CI Pipeline — Full workflow with lint, test, and build
# =============================================================================
# Run:   gci run -f examples/drone/go-ci.yml --docker
#        gci run -f examples/drone/go-ci.yml --docker --job test
#        gci ls -f examples/drone/go-ci.yml
# =============================================================================

kind: pipeline
type: docker
name: go-ci

trigger:
  branch:
    - main
    - develop
  event:
    - push
    - pull_request

environment:
  GO_VERSION: "1.24"
  GOFLAGS: "-mod=mod"

steps:
  - name: lint
    image: golang:${GO_VERSION}
    commands:
      - go fmt ./...
      - go vet ./...
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - golangci-lint run --timeout 5m
      - go install golang.org/x/tools/cmd/errcheck@latest
      - errcheck ./...
    when:
      event:
        - pull_request

  - name: test
    image: golang:${GO_VERSION}
    commands:
      - go mod download
      - go test -v -race -count=1 ./... 2>&1 | tee /tmp/test-output.log
      - go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - go tool cover -func=coverage.out
      - go tool cover -html=coverage.out -o /tmp/coverage.html
    depends_on:
      - lint

  - name: test-integration
    image: golang:${GO_VERSION}
    commands:
      - go mod download
      - go test -v -tags=integration -count=1 ./...
    depends_on:
      - lint
    when:
      event:
        - push
      branch:
        - main

  - name: build
    image: golang:${GO_VERSION}
    commands:
      - go mod download
      - go build -ldflags="-s -w -X main.version=${DRONE_COMMIT_SHA:0:7} -X main.commit=${DRONE_COMMIT_SHA}" -o /tmp/app .
      - file /tmp/app
      - /tmp/app -version 2>/dev/null || echo "Version flag optional"
    depends_on:
      - test

  - name: docker-publish
    image: plugins/docker
    settings:
      repo: myorg/myapp
      tags:
        - latest
        - "${DRONE_COMMIT_SHA:0:7}"
      dockerfile: Dockerfile
      build_args:
        - VERSION=${DRONE_COMMIT_SHA:0:7}
    depends_on:
      - build
    when:
      branch:
        - main
      event:
        - push

  - name: deploy
    image: alpine:latest
    commands:
      - apk add --no-cache curl
      - echo "Deploying app version ${DRONE_COMMIT_SHA:0:7}..."
      - echo "Add deployment commands here (e.g., kubectl set image, helm upgrade)"
      - |
        if [ -n "$DEPLOY_URL" ]; then
          curl -X POST -d "version=${DRONE_COMMIT_SHA:0:7}" "$DEPLOY_URL"
        fi
    depends_on:
      - docker-publish
    when:
      branch:
        - main
      event:
        - push

services:
  - name: postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test

  - name: redis
    image: redis:7-alpine
