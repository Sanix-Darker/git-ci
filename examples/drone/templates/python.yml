kind: pipeline
type: docker
name: python-ci

trigger:
  branch:
    - main
  event:
    - push
    - pull_request

environment:
  PYTHON_VERSION: "3.11"

steps:
  - name: test
    image: python:${PYTHON_VERSION}
    commands:
      - pip install -r requirements.txt
      - pip install pytest flake8
      - flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - pytest

  - name: build
    image: python:${PYTHON_VERSION}
    commands:
      - python setup.py sdist bdist_wheel
    depends_on:
      - test
