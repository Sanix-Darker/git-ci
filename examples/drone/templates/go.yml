kind: pipeline
type: docker
name: go-ci

trigger:
  branch:
    - main
    - develop
  event:
    - push
    - pull_request

environment:
  GO_VERSION: "1.22"
  CGO_ENABLED: "0"

steps:
  - name: lint
    image: golang:${GO_VERSION}
    commands:
      - go fmt ./...
      - go vet ./...

  - name: test
    image: golang:${GO_VERSION}
    commands:
      - go mod download
      - go test -v -race -count=1 ./...
      - go test -race -coverprofile=coverage.out ./...

  - name: build
    image: golang:${GO_VERSION}
    commands:
      - go build -ldflags="-s -w" -o app .
    depends_on:
      - test
